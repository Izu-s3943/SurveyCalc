name: SurveyCalc
options:
  bundleIdPrefix: com.selfuse.surveycalc
  deploymentTarget:
    iOS: "17.0"

targets:
  SurveyCalc:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - SurveyCalcApp
    info:
      path: Generated/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "現在地から座標を取得するために使用します"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.selfuse.surveycalc
        PRODUCT_NAME: SurveyCalc
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  SurveyCalc:
    build:
      targets:
        SurveyCalc: all
    archive:
      config: Release
